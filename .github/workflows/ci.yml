name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: 11.9.0
      - uses: actions/setup-node@v6
        with:
          node-version: 22.16.0
          cache: pnpm
          cache-dependency-path: web/capacitor-ui/pnpm-lock.yaml
      - name: Install frontend dependencies
        working-directory: web/capacitor-ui
        run: pnpm install --frozen-lockfile
      - name: Build frontend
        working-directory: web/capacitor-ui
        run: pnpm run build
      - name: Verify committed Android assets
        run: node scripts/verify-frontend-assets.mjs

  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17
      - uses: gradle/actions/setup-gradle@v6
        with:
          cache-provider: basic
      - name: Test and assemble debug APK
        run: ./gradlew testDebugUnitTest :app:assembleDebug --no-daemon
